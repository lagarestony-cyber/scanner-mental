<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner Mental</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f1a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 400px;
  text-align: center;
}

h1 { font-size: 22px; }
h2 { font-size: 20px; }

button {
  padding: 15px;
  width: 100%;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #6c5ce7;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #5a4cd1;
}

.progress {
  height: 5px;
  background: #333;
  margin-bottom: 20px;
  border-radius: 5px;
  overflow: hidden;
}

.progress-bar {
  height: 5px;
  background: #6c5ce7;
  width: 0%;
  transition: 0.3s;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- INÍCIO -->
  <div id="start">
    <h1>Sua mente pode estar te sabotando</h1>
    <p>Descubra em 60 segundos seu nível mental</p>

    <p>✔ Sem cadastro<br>✔ Resultado imediato<br>✔ Leva menos de 1 minuto</p>

    <button onclick="startQuiz()">Fazer teste agora</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hidden">
    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <h2 id="question"></h2>
    <div id="answers"></div>
  </div>

  <!-- LOADING -->
  <div id="loading" class="hidden">
    <h2>Analisando seu padrão mental...</h2>
  </div>

  <!-- RESULTADO -->
  <div id="result" class="hidden">
    <h2 id="resultTitle"></h2>
    <p id="resultText"></p>

    <button onclick="redirect()">Ver como resolver isso agora</button>
  </div>

</div>

<script>

const questions = [
  {
    q: "Como você se sente ao acordar?",
    a: [
      { text: "Animado", score: 1 },
      { text: "Normal", score: 2 },
      { text: "Cansado", score: 3 },
      { text: "Sem vontade", score: 4 }
    ]
  },
  {
    q: "Sua mente anda mais...",
    a: [
      { text: "Focada", score: 1 },
      { text: "Distraída", score: 3 },
      { text: "Ansiosa", score: 4 },
      { text: "Confusa", score: 4 }
    ]
  },
  {
    q: "Você sente que está evoluindo?",
    a: [
      { text: "Sim", score: 1 },
      { text: "Mais ou menos", score: 2 },
      { text: "Não", score: 4 }
    ]
  },
  {
    q: "Você termina o que começa?",
    a: [
      { text: "Sempre", score: 1 },
      { text: "Às vezes", score: 2 },
      { text: "Quase nunca", score: 4 }
    ]
  },
  {
    q: "Seu nível de energia é...",
    a: [
      { text: "Alto", score: 1 },
      { text: "Médio", score: 2 },
      { text: "Baixo", score: 4 }
    ]
  }
];

let current = 0;
let score = 0;

function startQuiz() {
  document.getElementById("start").classList.add("hidden");
  document.getElementById("quiz").classList.remove("hidden");
  showQuestion();
}

function showQuestion() {
  let q = questions[current];
  document.getElementById("question").innerText = q.q;

  let answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach(ans => {
    let btn = document.createElement("button");
    btn.innerText = ans.text;
    btn.onclick = () => nextQuestion(ans.score);
    answersDiv.appendChild(btn);
  });

  updateProgress();
}

function nextQuestion(s) {
  score += s;
  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    showLoading();
  }
}

function updateProgress() {
  let percent = ((current) / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";
}

function showLoading() {
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("loading").classList.remove("hidden");

  setTimeout(showResult, 2000);
}

function showResult() {
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  let title = "";
  let text = "";

  if (score <= 7) {
    title = "Mente Focada";
    text = "Você já tem um bom controle mental.\n\nMas ainda pode evoluir para um nível onde foco, disciplina e clareza se tornam naturais.\n\nCom as estratégias certas, você acelera ainda mais seus resultados.";
  } else if (score <= 12) {
    title = "Mente Distraída";
    text = "Sua mente perde foco com facilidade, principalmente com excesso de estímulos.\n\nIsso pode estar atrasando sua evolução e te fazendo começar coisas sem terminar.\n\nCom alguns ajustes simples, você consegue recuperar seu foco e disciplina.";
  } else {
    title = "Mente Sobrecarregada";
    text = "Sua mente está consumindo energia demais com pensamentos e estímulos constantes.\n\nIsso pode estar te deixando cansado, sem foco e travado — mesmo sem você perceber.\n\nMas isso não melhora sozinho.\n\nExiste uma forma simples de recuperar o controle mental e reduzir essa sobrecarga no dia a dia.";
  }

  document.getElementById("resultTitle").innerText = title;
  document.getElementById("resultText").innerText = text;
}

function redirect() {
  let link = "";

  if (score <= 7) {
    link = "https://go.hotmart.com/A104629637C"; // combo
  } else if (score <= 12) {
    link = "https://go.hotmart.com/K104595453M"; // detox
  } else {
    link = "https://go.hotmart.com/V104583149C"; // mente inabalável
  }

  window.location.href = link;
}

</script>

</body>
</html>
